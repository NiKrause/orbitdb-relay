name: Aleph Rootfs Build, Publish & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the rootfs image to Aleph IPFS
        type: boolean
        default: false
      deploy_vm:
        description: Deploy a new Aleph VM instance after publishing
        type: boolean
        default: false
      enable_caddy_proxy:
        description: Configure the guest with Caddy HTTPS/WSS proxy
        type: boolean
        default: true

permissions:
  actions: read
  contents: read

jobs:
  build-rootfs:
    uses: NiKrause/shared-aleph-tooling/.github/workflows/aleph-rootfs-build-publish-deploy.yml@b13379426c14e6d5cb0d2fb44a4c30a5c867a9ca
    with:
      profile: orbitdb-relay-pinner
      rootfs_contract_path: aleph/contract.json
      tooling_ref: b13379426c14e6d5cb0d2fb44a4c30a5c867a9ca
      publish: ${{ github.event_name == 'workflow_dispatch' && inputs.publish || false }}
    secrets:
      ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}

  summarize-rootfs-artifacts:
    needs: build-rootfs
    if: ${{ always() && needs.build-rootfs.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve rootfs artifact URLs
        env:
          ARTIFACT_NAME: rootfs-orbitdb-relay-pinner-${{ github.run_id }}-${{ github.run_attempt }}
          GITHUB_TOKEN: ${{ github.token }}
          MANIFEST_PATH: ${{ needs.build-rootfs.outputs.rootfs_manifest_path }}
          MANIFEST_COPY_TARGET_PATH: ${{ needs.build-rootfs.outputs.rootfs_manifest_copy_target_path }}
          MANIFEST_VERSIONED_PATH: ${{ needs.build-rootfs.outputs.rootfs_manifest_versioned_path }}
          ROOTFS_CID: ${{ needs.build-rootfs.outputs.rootfs_cid }}
          ROOTFS_ITEM_HASH: ${{ needs.build-rootfs.outputs.rootfs_item_hash }}
          ROOTFS_VERSION: ${{ needs.build-rootfs.outputs.rootfs_version }}
        shell: bash
        run: |
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts"
          artifact_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}")"
          export ARTIFACT_JSON="${artifact_json}"

          artifact_id="$(python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["ARTIFACT_JSON"])
          target = os.environ["ARTIFACT_NAME"]
          for artifact in payload.get("artifacts", []):
              if artifact.get("name") == target:
                  print(artifact.get("id", ""))
                  break
          PY
          )"

          if [[ -z "${artifact_id}" ]]; then
            echo "Unable to resolve artifact id for ${ARTIFACT_NAME}" >&2
            exit 1
          fi

          artifact_page_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${artifact_id}"
          artifact_api_zip_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip"

          {
            echo "## Rootfs Artifact URLs"
            echo
            echo "- Rootfs version: \`${ROOTFS_VERSION}\`"
            echo "- Rootfs CID: \`${ROOTFS_CID}\`"
            echo "- Rootfs Aleph item hash: \`${ROOTFS_ITEM_HASH}\`"
            echo "- Manifest artifact page: ${artifact_page_url}"
            echo "- Manifest artifact ZIP API URL: \`${artifact_api_zip_url}\`"
            echo "- Manifest path inside runner workspace: \`${MANIFEST_PATH}\`"
            if [[ -n "${MANIFEST_COPY_TARGET_PATH}" ]]; then
              echo "- Latest copied manifest path: \`${MANIFEST_COPY_TARGET_PATH}\`"
            fi
            if [[ -n "${MANIFEST_VERSIONED_PATH}" ]]; then
              echo "- Versioned copied manifest path: \`${MANIFEST_VERSIONED_PATH}\`"
            fi
            echo
            echo "The manifest JSON is currently stored as a GitHub Actions artifact, not pinned to IPFS."
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy-vm:
    needs: [build-rootfs, summarize-rootfs-artifacts]
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy_vm &&
      inputs.publish &&
      needs.build-rootfs.outputs.rootfs_item_hash != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout shared tooling
        uses: actions/checkout@v6
        with:
          repository: NiKrause/shared-aleph-tooling
          ref: b13379426c14e6d5cb0d2fb44a4c30a5c867a9ca

      - name: Deploy Aleph VM instance
        uses: ./.github/actions/aleph-vm-deploy
        with:
          mode: deploy
          profile: orbitdb-relay-pinner
          name: orbitdb-relay-pinner
          aleph_private_key: ${{ secrets.ALEPH_PRIVATE_KEY }}
          channel: ALEPH-CLOUDSOLUTIONS
          rootfs_item_hash: ${{ needs.build-rootfs.outputs.rootfs_item_hash }}
          rootfs_version: ${{ needs.build-rootfs.outputs.rootfs_version }}
          rootfs_size_mib: '20480'
          vcpus: '1'
          memory_mib: '2048'
          enable_caddy_proxy: ${{ inputs.enable_caddy_proxy && 'true' || 'false' }}
          auto_configure: 'true'
          verify_reachability: 'true'
          publish_port_forwards: 'true'
          ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          required_ports_json: |
            [
              {"port": 22, "tcp": true, "udp": false},
              {"port": 80, "tcp": true, "udp": false},
              {"port": 443, "tcp": true, "udp": false},
              {"port": 9090, "tcp": true, "udp": false},
              {"port": 9091, "tcp": true, "udp": false},
              {"port": 9093, "tcp": false, "udp": true},
              {"port": 9094, "tcp": false, "udp": true}
            ]
