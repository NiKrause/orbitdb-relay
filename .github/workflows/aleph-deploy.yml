name: Aleph Rootfs Build, Publish & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the rootfs image to Aleph IPFS
        type: boolean
        default: false
      deploy_vm:
        description: Deploy a new Aleph VM instance after publishing
        type: boolean
        default: false
      enable_caddy_proxy:
        description: Configure the guest with Caddy HTTPS/WSS proxy
        type: boolean
        default: true
      rootfs_item_hash:
        description: Existing Aleph STORE item hash to deploy without publishing a new rootfs
        type: string
        default: ''
      rootfs_version:
        description: Version string for an existing rootfs item hash
        type: string
        default: ''
      aleph_api_hosts:
        description: Comma-separated Aleph API hosts to try in order
        type: string
        default: 'https://api.aleph.im,https://api2.aleph.im,https://api3.aleph.im'
      vm_ssh_public_key:
        description: Optional SSH public key override for the deployed VM
        type: string
        default: ''
      vm_crn_hash:
        description: Optional target CRN hash for the deployment
        type: string
        default: ''
      vm_placement_strategy:
        description: Placement mode when no CRN hash is supplied
        type: choice
        default: scheduler
        options:
          - scheduler
          - manual
      retain_successful_deployments:
        description: Keep only latest N successful published+deployed records
        type: string
        default: '2'

permissions:
  actions: read
  contents: read

jobs:
  build-rootfs:
    uses: NiKrause/relay-button/.github/workflows/aleph-rootfs-build-publish-deploy.yml@0c0f84149af9e18bbc8a77a43fe68e892d4fa64e
    with:
      profile: orbitdb-relay
      rootfs_contract_path: aleph/contract.json
      tooling_ref: 0c0f84149af9e18bbc8a77a43fe68e892d4fa64e
      publish: ${{ github.event_name == 'workflow_dispatch' && inputs.publish || false }}
      deploy_vm: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_vm || false }}
      enable_caddy_proxy: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_caddy_proxy }}
      rootfs_item_hash: ${{ github.event_name == 'workflow_dispatch' && inputs.rootfs_item_hash || '' }}
      rootfs_version: ${{ github.event_name == 'workflow_dispatch' && inputs.rootfs_version || '' }}
      vm_api_hosts: ${{ github.event_name == 'workflow_dispatch' && inputs.aleph_api_hosts || 'https://api.aleph.im,https://api2.aleph.im,https://api3.aleph.im' }}
      vm_name: orbitdb-relay
      vm_ssh_public_key: ${{ github.event_name == 'workflow_dispatch' && inputs.vm_ssh_public_key || '' }}
      vm_crn_hash: ${{ github.event_name == 'workflow_dispatch' && inputs.vm_crn_hash || '' }}
      vm_placement_strategy: ${{ github.event_name == 'workflow_dispatch' && inputs.vm_placement_strategy || 'scheduler' }}
      vm_vcpus: '1'
      vm_memory_mib: '2048'
      vm_rootfs_size_mib: '20480'
      vm_preferred_country_code: DE
      vm_geo_crn_limit: '30'
      vm_max_crn_attempts: '5'
      vm_channel: ALEPH-CLOUDSOLUTIONS
      vm_seconds: '30'
      relay_probe_required_families_json: '["tcp","proxy-wss"]'
      relay_probe_best_effort_families_json: '["webrtc-direct"]'
      relay_probe_proxy_wss_host_matchers_json: '[".2n6.me/"]'
      probe_timeout_ms: '20000'
      probe_settle_ms: '1500'
      retain_successful_deployments: ${{ github.event_name == 'workflow_dispatch' && inputs.retain_successful_deployments || '0' }}
    secrets:
      ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
      VM_SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
